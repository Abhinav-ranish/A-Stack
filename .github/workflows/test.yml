name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20', '22']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Show environment
        run: |
          node --version
          npm --version
      - name: Run tests
        run: npm test
      - name: Doctor (best-effort)
        run: |
          node scripts/a-stack.mjs doctor || true
